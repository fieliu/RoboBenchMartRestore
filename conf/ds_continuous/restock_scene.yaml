defaults:
  - config
  - _self_

name: 'restock_scene'

size_x: 16
size_y: 10
num_scenes: 1
num_workers: 1
rewrite: true
layout_gen_type: PROCEDURAL_TENSOR_FIELD
randomize_layout: true
randomize_arrangements: true
output_dir: generated_envs/${ds_continuous.name}

random_seed: 42

inactive_wall_shelvings_occupancy_width: 0.4
inactive_shelvings_occupancy_width: 1.0
fixtures_occupancy_width: 0.2
passage_width: 2.0
inactive_shelvings_skip_prob: 0.1
tf_blending_decay: 12.0
max_tries: 20

active_shelvings_list:
  - name: 'mixed_shelf'
    filling_type: BOARDWISE_COLUMNS
    x_gap: 0.05
    y_gap: 0.05
    shelf_asset: fixtures.shelf_metal
    shuffle_boards: True
    board_product_numcol:
      1:
        food.HYGIENE.NiveaBodyMilk: 8
        food.drinks.coffeePackaging: 8
      2:
        food.grocery.nestleFitnessChocolateCerealBox: 6
        food.dairy_products.milkCarton: 8
      3:
        food.BEER.DuffBeerCan: 10
        food.DRINKS_SODA.FantaSaborNaranja2L: 8

inactive_shelvings_list:
  - fixtures.shelf_metal

inactive_wall_shelvings_list:
  - fixtures.freezer_large

scene_fixtures_list:
  - fixtures.pile_of_pallets
  - fixtures.pallets_and_boxes
  - fixtures.freezer_nestle

fake_arrangements_mapping:
  fixtures.shelf_metal:
    - fixtures.shelf_metal_fake_1
    - fixtures.shelf_metal_fake_2
